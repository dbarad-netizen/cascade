<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cascade Venture Capital · Investor Engine</title>
<meta name="theme-color" content="#0a0a0a">
<style>
  :root{
    --bg:#0a0a0a; --panel:#101113; --panel2:#15161a; --line:#23252a;
    --txt:#f4f4f2; --muted:#8c9097; --faint:#5a5e66;
    --accent:#6ea3d6; --accent2:#4d7ba8; --gold:#c6a96a;
    --green:#5cbf8d; --amber:#d4b162; --red:#d97b7b; --lock:#6b7076;
    --hnw:#d48ac0;
    --shadow:0 10px 36px rgba(0,0,0,.55);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;
    font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
  a{color:var(--accent);text-decoration:none}
  .wrap{max-width:1180px;margin:0 auto;padding:0 22px}

  header{border-bottom:1px solid var(--line);background:linear-gradient(180deg,#0c0c0c,#0a0a0a);position:sticky;top:0;z-index:30}
  .topbar{display:flex;align-items:center;gap:16px;padding:18px 0 14px}
  .brand{display:flex;align-items:center;gap:14px}
  .brand .mark{font-weight:600;letter-spacing:.30em;font-size:16px;text-transform:uppercase}
  .brand .divider{width:1px;height:20px;background:var(--line)}
  .brand .sub{color:var(--muted);font-size:11px;letter-spacing:.18em;text-transform:uppercase}
  .est{margin-left:auto;display:flex;align-items:center;gap:14px}
  .est .yr{color:var(--faint);font-size:11px;letter-spacing:.14em;text-transform:uppercase}
  .pill{font-size:10px;color:var(--muted);border:1px solid var(--line);background:var(--panel2);
    padding:5px 11px;border-radius:999px;letter-spacing:.12em;text-transform:uppercase}
  nav.tabs{display:flex;gap:2px;padding-bottom:0;flex-wrap:wrap}
  nav.tabs button{background:none;border:none;color:var(--muted);font-size:11px;font-weight:600;
    padding:12px 13px;cursor:pointer;border-bottom:1px solid transparent;letter-spacing:.12em;text-transform:uppercase}
  nav.tabs button:hover{color:var(--txt)}
  nav.tabs button.active{color:var(--txt);border-bottom-color:var(--accent)}

  main{padding:30px 0 70px}
  .eyebrow{color:var(--accent);font-size:11px;letter-spacing:.18em;text-transform:uppercase;margin:0 0 8px;font-weight:600}
  h1.page{font-size:23px;margin:0 0 5px;letter-spacing:-.01em;font-weight:600}
  .lede{color:var(--muted);margin:0 0 22px;max-width:760px}

  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
  .kpi{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px 16px 14px}
  .kpi .v{font-size:26px;font-weight:700;letter-spacing:-.01em}
  .kpi .l{color:var(--muted);font-size:12px;margin-top:3px}
  .kpi .d{font-size:11px;margin-top:7px;color:var(--faint)}
  .kpi.accent .v{color:var(--accent)}
  .kpi.gold .v{color:var(--gold)}
  .kpi.hnw .v{color:var(--hnw)}

  .panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:20px;margin-bottom:18px}
  .panel h2{margin:0 0 4px;font-size:15px}
  .panel .sub{color:var(--muted);font-size:12.5px;margin:0 0 16px}

  /* funnel */
  .funnel{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
  .fstep{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:14px;position:relative}
  .fstep .n{font-size:24px;font-weight:700}
  .fstep .t{color:var(--muted);font-size:12px;margin-top:2px}
  .fstep .cap{font-size:11px;color:var(--faint);margin-top:8px}
  .fstep.s-new .n{color:var(--faint)}
  .fstep.s-establishing .n{color:var(--amber)}
  .fstep.s-established .n{color:var(--accent)}
  .fstep.s-active .n{color:var(--green)}
  .arrow{color:var(--faint);text-align:center;font-size:18px}

  /* segment mix */
  .segrow{display:flex;align-items:center;gap:12px;margin-bottom:9px}
  .segrow .sl{flex:none;width:170px;font-size:12.5px;color:var(--muted)}
  .segrow .sb{flex:1;height:10px;border-radius:6px;background:#1d1f23;overflow:hidden}
  .segrow .sb i{display:block;height:100%;border-radius:6px}
  .segrow .sv{flex:none;width:120px;text-align:right;font-size:12px;font-variant-numeric:tabular-nums}

  /* table */
  table{width:100%;border-collapse:collapse}
  th{text-align:left;color:var(--faint);font-size:11px;text-transform:uppercase;letter-spacing:.06em;
    font-weight:600;padding:0 10px 9px;border-bottom:1px solid var(--line)}
  td{padding:11px 10px;border-bottom:1px solid #1d1f23;vertical-align:middle}
  tbody tr{cursor:pointer}
  tbody tr:hover{background:#161719}
  .who{font-weight:600}
  .whosub{color:var(--muted);font-size:12px}
  .tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:6px;border:1px solid var(--line);
    color:var(--muted);background:#17181b;white-space:nowrap}
  .sig{color:var(--muted);font-size:12.5px}
  .sigdot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:7px;vertical-align:middle}
  .badge{font-size:11px;font-weight:600;padding:3px 9px;border-radius:999px;white-space:nowrap}
  .b-new{color:var(--faint);background:#16181b;border:1px solid var(--line)}
  .b-establishing{color:var(--amber);background:#221d10;border:1px solid #3a3118}
  .b-established{color:var(--accent);background:#0f1d2b;border:1px solid #1d3a55}
  .b-active{color:var(--green);background:#0f241a;border:1px solid #1c4030}
  .chk{font-variant-numeric:tabular-nums;font-weight:600}
  .tier{font-size:10.5px;color:var(--faint)}
  .tier.core{color:var(--gold)}
  .tier.sel{color:var(--accent)}
  .right{text-align:right}
  .filterbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
  .filterbar select,.filterbar input{background:var(--panel2);border:1px solid var(--line);color:var(--txt);
    border-radius:8px;padding:8px 10px;font-size:13px}
  .filterbar .spacer{flex:1}
  .muted{color:var(--muted)}

  /* drawer */
  .scrim{position:fixed;inset:0;background:rgba(4,6,9,.6);opacity:0;pointer-events:none;transition:.2s;z-index:40}
  .scrim.on{opacity:1;pointer-events:auto}
  .drawer{position:fixed;top:0;right:0;height:100%;width:460px;max-width:94vw;background:var(--panel);
    border-left:1px solid var(--line);box-shadow:var(--shadow);transform:translateX(100%);transition:.24s;z-index:50;
    overflow-y:auto;padding:22px}
  .drawer.on{transform:none}
  .drawer .x{position:absolute;top:16px;right:18px;color:var(--muted);font-size:20px;cursor:pointer;background:none;border:none}
  .dh{display:flex;align-items:center;gap:12px;margin-bottom:4px}
  .avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#1e2024,#141518);
    display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--accent);border:1px solid var(--line)}
  .dh .nm{font-size:17px;font-weight:700}
  .dh .ty{color:var(--muted);font-size:12.5px}
  .sec{margin-top:18px}
  .sec h4{margin:0 0 9px;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--faint)}
  .kv{display:flex;justify-content:space-between;gap:12px;padding:6px 0;border-bottom:1px solid #1b212c;font-size:13px}
  .kv .k{color:var(--muted)}
  .kv .v{text-align:right;font-weight:600}
  /* stepper */
  .steps{display:flex;align-items:center;margin:6px 0 4px}
  .step{flex:1;text-align:center;position:relative}
  .step .dot{width:18px;height:18px;border-radius:50%;background:#1d1f23;border:2px solid var(--line);margin:0 auto;z-index:2;position:relative}
  .step .lab{font-size:10.5px;color:var(--faint);margin-top:6px;line-height:1.25}
  .step:not(:last-child):after{content:"";position:absolute;top:8px;left:50%;width:100%;height:2px;background:var(--line);z-index:1}
  .step.done .dot{background:var(--accent);border-color:var(--accent)}
  .step.done.act .dot{background:var(--green);border-color:var(--green)}
  .step.done .lab{color:var(--txt)}
  .step.curr .dot{box-shadow:0 0 0 4px rgba(91,168,230,.18)}
  .timeline{list-style:none;margin:0;padding:0}
  .timeline li{position:relative;padding:0 0 12px 18px;font-size:12.5px;color:var(--muted)}
  .timeline li:before{content:"";position:absolute;left:0;top:5px;width:8px;height:8px;border-radius:50%;background:var(--accent2)}
  .timeline li:not(:last-child):after{content:"";position:absolute;left:3.5px;top:11px;bottom:0;width:1px;background:var(--line)}
  .timeline li b{color:var(--txt);font-weight:600}
  .elig{margin-top:14px;border-radius:10px;padding:11px 13px;font-size:12.5px;display:flex;gap:9px;align-items:flex-start}
  .elig.ok{background:#0f241a;border:1px solid #1c4030;color:#bfe9d2}
  .elig.no{background:#241616;border:1px solid #402020;color:#e9c7c7}
  .elig .i{font-weight:700}

  /* deal matcher */
  .dealgrid{display:grid;grid-template-columns:300px 1fr;gap:18px}
  .deal{background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:14px;cursor:pointer;margin-bottom:10px}
  .deal.sel{border-color:var(--accent);background:#12161b}
  .deal .co{font-weight:700;font-size:15px}
  .deal .meta{color:var(--muted);font-size:12px;margin-top:2px}
  .deal .alloc{margin-top:10px;font-size:12px;color:var(--faint)}
  .allocbar{height:8px;border-radius:6px;background:#1d1f23;overflow:hidden;margin-top:6px}
  .allocbar > i{display:block;height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));width:0;transition:.3s}
  .matchhead{display:flex;align-items:flex-end;gap:18px;flex-wrap:wrap;margin-bottom:6px}
  .bigfill{font-size:30px;font-weight:700;letter-spacing:-.01em}
  .bigfill small{font-size:14px;color:var(--muted);font-weight:500}
  .metricrow{display:flex;gap:26px;margin:4px 0 16px;flex-wrap:wrap}
  .metricrow .m .v{font-size:18px;font-weight:700}
  .metricrow .m .l{font-size:11px;color:var(--muted)}
  .mrow{display:flex;align-items:center;gap:12px;padding:11px 12px;border:1px solid var(--line);border-radius:10px;margin-bottom:8px;background:var(--panel2)}
  .mrow.locked{opacity:.6}
  .mrow .sel-btn{width:22px;height:22px;border-radius:6px;border:1.5px solid var(--line);background:#141517;cursor:pointer;flex:none;display:flex;align-items:center;justify-content:center;color:#0a0c10;font-size:14px;font-weight:800}
  .mrow.on .sel-btn{background:var(--accent);border-color:var(--accent)}
  .mrow .grow{flex:1;min-width:0}
  .mrow .nm{font-weight:600}
  .mrow .mt{font-size:12px;color:var(--muted)}
  .lockmsg{font-size:11.5px;color:var(--amber);display:flex;align-items:center;gap:6px}
  .note{background:#141517;border:1px dashed var(--line);border-radius:10px;padding:12px 14px;color:var(--muted);font-size:12.5px;margin-top:10px}

  /* prospect finder */
  .presets{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  .preset{background:var(--panel2);border:1px solid var(--line);color:var(--muted);border-radius:8px;
    padding:9px 13px;font-size:12.5px;cursor:pointer;font-weight:600}
  .preset:hover{color:var(--txt)}
  .preset.on{border-color:var(--accent);color:var(--txt);background:#12161b}
  .preset.hnwp.on{border-color:var(--hnw)}
  .runbtn{background:var(--accent);border:none;color:#07121c;font-weight:700;border-radius:8px;
    padding:10px 16px;font-size:13px;cursor:pointer;letter-spacing:.02em}
  .runbtn:disabled{opacity:.55;cursor:default}
  .banner{background:#141517;border:1px solid var(--line);border-left:3px solid var(--accent);
    border-radius:8px;padding:11px 14px;color:var(--muted);font-size:12px;margin:0 0 16px}
  .banner.hnwb{border-left-color:var(--hnw)}
  .pcard{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:12px;
    display:flex;gap:16px;align-items:flex-start}
  .ring{flex:none;width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-weight:700;font-size:14px;border:2px solid var(--accent);color:var(--accent)}
  .ring.mid{border-color:var(--gold);color:var(--gold)}
  .ring.low{border-color:var(--faint);color:var(--muted)}
  .pgrow{flex:1;min-width:0}
  .pname{font-weight:700;font-size:15px}
  .pmeta{color:var(--muted);font-size:12px;margin-top:2px}
  .chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px}
  .chip{font-size:11px;border:1px solid var(--line);border-radius:6px;padding:2px 8px;color:var(--muted);background:var(--panel2)}
  .chip.b{color:var(--accent);border-color:#27425c}
  .chip.g{color:var(--green);border-color:#1c4030}
  .chip.p{color:var(--hnw);border-color:#4a2c42}
  .ppl{margin-top:10px;font-size:12.5px}
  .ppl .h{color:var(--faint);font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
  .ppl .person{color:var(--txt)}
  .ppl .person b{font-weight:600}
  .ppl .role{color:var(--muted)}
  .paction{flex:none;display:flex;flex-direction:column;gap:8px;align-items:flex-end}
  .addbtn{background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:8px 12px;
    font-size:12px;cursor:pointer;white-space:nowrap;font-weight:600}
  .addbtn:hover{border-color:var(--accent)}
  .addbtn.done{color:var(--green);border-color:#1c4030;cursor:default}
  .plink{font-size:11.5px}
  .spin{display:inline-block;width:16px;height:16px;border:2px solid var(--line);border-top-color:var(--accent);
    border-radius:50%;animation:sp .8s linear infinite;vertical-align:-3px;margin-right:8px}
  @keyframes sp{to{transform:rotate(360deg)}}
  .finderbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:18px}
  .finderbar input{background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:10px 12px;font-size:13px}
  .finderbar #fq{flex:1;min-width:220px}
  .finderbar .stinput{width:120px;text-transform:uppercase}
  .netitem{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid #1d1f23}
  .netitem:last-child{border-bottom:none}
  .netitem .grow{flex:1;min-width:0}
  .netitem .nn{font-weight:600}
  .netitem .nr{color:var(--muted);font-size:12px}
  .netitem .via{font-size:11px;color:var(--accent)}
  .refform{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:4px}
  .refform input,.refform select{background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:8px;padding:9px 11px;font-size:13px}
  .refform input.rn{flex:1;min-width:180px}
  .okmsg{color:var(--green);font-size:12.5px;margin-top:10px}
  .legend{display:flex;gap:16px;flex-wrap:wrap;color:var(--muted);font-size:12px;margin-top:8px}
  .legend span{display:inline-flex;align-items:center;gap:6px}
  .howcol{columns:2;column-gap:26px}
  @media(max-width:880px){.kpis{grid-template-columns:repeat(2,1fr)}.dealgrid{grid-template-columns:1fr}.funnel{grid-template-columns:1fr 1fr}.howcol{columns:1}}
  .footnote{color:var(--faint);font-size:11.5px;margin-top:26px;border-top:1px solid var(--line);padding-top:14px}
  .seclist{font-size:12px;color:var(--muted)}
  .warm{font-size:12px}
  .warm b{color:var(--txt)}
  /* hnw channels */
  .chgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  @media(max-width:880px){.chgrid{grid-template-columns:1fr}}
  .chcard{background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:14px;display:flex;flex-direction:column;gap:8px}
  .chcard .cn{font-weight:700}
  .chcard .cd{color:var(--muted);font-size:12.5px;flex:1}
  .evrow{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #1d1f23}
  .evrow:last-child{border-bottom:none}
  .evrow .co{font-weight:700;flex:none;width:110px}
  .evrow .ed{flex:1;color:var(--muted);font-size:12.5px}
  .evrow .ew{flex:none;font-size:11px;color:var(--faint)}
</style>
</head>
<body>
<header>
  <div class="wrap">
    <div class="topbar">
      <div class="brand">
        <span class="mark">Cascade</span>
        <span class="divider"></span>
        <span class="sub">Investor Engine</span>
      </div>
      <div class="est">
        <span class="yr">Est. 2024</span>
        <span class="pill">Prototype v2 · HNW</span>
      </div>
    </div>
    <nav class="tabs" id="tabs">
      <button data-tab="overview" class="active">Overview</button>
      <button data-tab="pipeline">Investor Pipeline</button>
      <button data-tab="warm">Warm Network</button>
      <button data-tab="hnw">HNW Channels</button>
      <button data-tab="finder">Prospect Finder</button>
      <button data-tab="competitor">Competitor Map</button>
      <button data-tab="matcher">Deal Matcher</button>
      <button data-tab="how">How it works</button>
    </nav>
  </div>
</header>

<main class="wrap" id="main"></main>

<div class="scrim" id="scrim" onclick="closeDrawer()"></div>
<aside class="drawer" id="drawer"></aside>

<script>
/* ---------- synthetic data ---------- */
const TEAM = {
  berg:   {name:"Matt Berg",       net:"Wall Street / hedge-fund LPs"},
  weis:   {name:"Matt Weisbarth",  net:"Pre-IPO secondary network"},
  jerry:  {name:"Jerry Weitzman",  net:"Databricks / operator network"},
  dustin: {name:"Dustin McCormick",net:"RIA / wealth-management network"},
  inbound:{name:"Inbound / referral", net:"Existing-investor referral"}
};
const SIG = {
  liquidity:  {label:"Liquidity event",     color:"#d8b25b"},
  techwealth: {label:"Tech wealth",         color:"#5ba8e6"},
  familyoffice:{label:"Family office / RIA",color:"#9b8cf0"},
  captable:   {label:"Cap-table holder",    color:"#4ec98a"},
  syndicate:  {label:"Syndicate member",    color:"#e08a5b"},
  profwealth: {label:"Professional wealth", color:"#d48ac0"},
};
const SEGS = {
  med:"Medicine", law:"Law", re:"Real estate", tech:"Tech professional",
  fin:"Finance", inst:"Institutional / channel"
};
const SEGCOLOR = {med:"#d48ac0", law:"#c6a96a", re:"#e08a5b", tech:"#5ba8e6", fin:"#5cbf8d", inst:"#9b8cf0"};
// HNW individual = everything except institutional / channel
const isHNW = (i)=> i.seg && i.seg!=="inst";

// stages: new -> establishing -> established -> active (eligible = established|active)
let INV = [
  {id:1,  name:"Helena Voss",          type:"Family Office (single)",      loc:"Greenwich, CT",  sig:"familyoffice", sigTxt:"$400M SFO, AI allocation mandate",          conn:"berg",   acc:"QP",         stage:"active",       check:500000,  vel:3,  seg:"inst", sectors:["Foundation Models","AI Infra"],                       prior:5, since:"2024-09", touch:6},
  {id:2,  name:"Marcus Lindqvist",     type:"Tech professional (ex-Stripe)",loc:"San Francisco", sig:"liquidity",    sigTxt:"Secondary sale, Stripe — Apr 2026",          conn:"weis",   acc:"Accredited", stage:"active",       check:150000,  vel:3,  seg:"tech", sectors:["AI Apps","Dev Tools"],                                prior:3, since:"2024-11", touch:9},
  {id:3,  name:"Priya Nadkarni",       type:"Operator (ex-Databricks)",    loc:"Seattle",        sig:"captable",     sigTxt:"Databricks cap-table holder",                conn:"jerry",  acc:"QP",         stage:"active",       check:250000,  vel:3,  seg:"tech", sectors:["AI Infra","Foundation Models"],                       prior:4, since:"2024-08", touch:4},
  {id:4,  name:"The Aldridge Group",   type:"Family Office (multi)",       loc:"Dallas",         sig:"familyoffice", sigTxt:"MFO, alternatives sleeve",                   conn:"dustin", acc:"QP",         stage:"established",  check:750000,  vel:7,  seg:"inst", sectors:["AI Infra","AI Apps","Foundation Models"],             prior:1, since:"2025-12", touch:12},

function relTimeline(i){
  const base=[
    {t:"Surfaced by signal", d:`${SIG[i.sig].label}: ${i.sigTxt}`},
    {t:"Routed to warm path", d:`Intro via ${TEAM[i.conn].name} — ${TEAM[i.conn].net}`},
  ];
  if(STAGE[i.stage].order>=1) base.push({t:"Relationship-establishment opened", d:`Since ${i.since}. Intro call held; sophistication &amp; objectives discussed.`});
  if(STAGE[i.stage].order>=2) base.push({t:"Substantive relationship established", d:`Accreditation (${i.acc}) confirmed; financial circumstances &amp; risk tolerance documented. Now eligible for offerings.`});
  if(STAGE[i.stage].order>=3) base.push({t:"Active investor", d:`${i.prior} prior SPV participation(s). Re-commits in ${VELLAB[i.vel]}.`});
  if(i.stage==="new") base.push({t:"Next step", d:"Schedule substantive intro call. No offering shown until relationship is established."});
  if(i.stage==="establishing") base.push({t:"Next step", d:"Complete sophistication &amp; accreditation documentation to reach eligibility."});
  return base.map(x=>`<li><b>${x.t}</b><br>${x.d}</li>`).join("");
}
function stepper(i){
  const ks=["new","establishing","established","active"];

      <div class="dot"></div><div class="lab">${STAGE[k].lab.replace(" · "," ")}</div>
    </div>`).join("")}</div>`;
}

function viewMatcher(){

  // matched = sector appetite overlaps + check >= min
  const matched = INV.filter(i=> i.sectors.includes(deal.sector) && i.check>=deal.min)
    .sort((a,b)=> (eligible(b)-eligible(a)) || b.check-a.check);
  const elig = matched.filter(eligible);
  const filled = Object.keys(sel).filter(k=>sel[k]).reduce((a,k)=>{const i=INV.find(x=>x.id===+k);return a+(i?i.check:0)},0);
  const pct=Math.min(100,filled/deal.alloc*100);
  const selCount=Object.keys(sel).filter(k=>sel[k]).length;

  const readyCap=elig.reduce((a,i)=>a+i.check,0);

  const dealCards=DEALS.map(d=>{

    const ok=eligible(i), on=!!sel[i.id];

        <div class="chk">${fmt$(i.check)}</div>
        <div class="mt">${ok?VELLAB[i.vel]:STAGE[i.stage].lab}</div>
      </div>
    </div>`;}).join("");
  return `
  <div class="eyebrow">07 — Allocation</div>
  <h1 class="page">Deal matcher &amp; allocation fill</h1>
  <p class="lede">Pick a live SPV. The engine ranks investors whose appetite and check fit — but it will only let you present the deal to investors with an established 506(b) relationship. Select investors to fill the allocation and watch how fast warm, ready capital comes together.</p>
  <div class="dealgrid">
    <div>${dealCards}</div>
    <div class="panel" style="margin:0">
      <div class="matchhead">
        <div><div class="bigfill">${fmtM(filled)} <small>/ ${fmtM(deal.alloc)} filled</small></div></div>
      </div>
      <div class="allocbar" style="height:12px"><i style="width:${pct}%"></i></div>
      <div class="metricrow">
        <div class="m"><div class="v">${selCount}</div><div class="l">investors selected</div></div>
        <div class="m"><div class="v">${fmtM(readyCap)}</div><div class="l">eligible capital available</div></div>
        <div class="m"><div class="v">${hnwShare}%</div><div class="l">of eligible are HNW individuals</div></div>
        <div class="m"><div class="v">${selCount?VELLAB[selVel]:"—"}</div><div class="l">est. time to close</div></div>
        <div class="m"><div class="v">${pct>=100?"✓ covered":Math.round(pct)+"%"}</div><div class="l">of allocation</div></div>
      </div>
      ${pct>=100?`<div class="elig ok" style="margin-top:0"><span class="i">✓</span><span>Allocation covered from ${selCount} pre-qualified investors, closeable in ${VELLAB[selVel]} — well inside the ${deal.window}-day window.</span></div>`:""}
      <div style="margin-top:14px">${mrows}</div>

    </div>

}

function runFinder(){
  const f=state.finder; f.loading=true; f.error=null; render();
  const qs="preset="+encodeURIComponent(f.preset)
    +(f.query?"&query="+encodeURIComponent(f.query):"")
    +(f.stateF?"&state="+encodeURIComponent(f.stateF):"");
  fetch("/api/find-prospects?"+qs)
    .then(r=> r.json().then(j=> r.ok ? j : Promise.reject(new Error(j.error||("HTTP "+r.status)))))
    .then(d=>{ f.loading=false; f.data=d; f.added={}; render(); })
    .catch(e=>{ f.loading=false; f.error=String(e&&e.message||e); render(); });
}

        <div style="text-align:right"><div class="chk">${fmt$(c.est)}</div><div class="via">warm intro</div></div>
        <button class="addbtn ${addedNet[c._i]?"done":""}" ${addedNet[c._i]?"":`onclick="routeNetwork(${c._i})"`}>${addedNet[c._i]?"✓ Routed":"Route to track →"}</button>
      </div>`).join("")}
    </div>`).join("");
  const actives=INV.filter(i=>i.stage==="active");
  const opts=actives.map(i=>`<option>${i.name}</option>`).join("");
  return `
  <div class="eyebrow">03 — Warm Network</div>
  <h1 class="page">Warm network &amp; referrals</h1>
  <p class="lede">The highest-conversion channel by far. These prospects come from the partners' own relationships and from existing-investor referrals — not scraped lists — so they enter the pipeline already warm. Route each into the 506(b) relationship track. Referrals from happy HNW professionals into their peer groups are the engine's #1 source of new individual LPs.</p>
  <div class="panel">
    <h2>Mine the team's network</h2>
    <p class="sub">Likely-qualified contacts surfaced from each partner's network. (Synthetic for the prototype; in production this imports from the team's contacts and CRM.)</p>
    ${netHtml}
  </div>
  <div class="panel">
    <h2>Capture a referral</h2>
    <p class="sub">Every happy investor is a source of two or three more — a surgeon refers surgeons, a partner refers partners. Log a referral and it enters the pipeline as a new prospect, with the referrer (and their segment) recorded.</p>
    <div class="refform">
      <input class="rn" id="refName" placeholder="Referred prospect name" />
      <select id="refBy"><option value="">Referred by…</option>${opts}</select>
      <input id="refCheck" placeholder="Est. check $" style="width:140px" />
      <button class="runbtn" onclick="logReferral()">Log referral</button>
    </div>
    ${refMsg?`<div class="okmsg">✓ ${refMsg}</div>`:""}
  </div>`;
}

/* ---------- competitor map (live SEC Form D) ---------- */
// Curated starting set of firms comparable to Cascade (late-stage / pre-IPO access,
// single-asset SPVs, secondaries). Editable — you can scan any name.
const COMPETITORS=[
  {n:"137 Ventures",              t:"Late-stage SPV access"},
  {n:"Goanna Capital",            t:"Late-stage AI / secondary"},
  {n:"Manhattan Venture Partners",t:"Pre-IPO secondaries + SPVs"},
  {n:"UpMarket",                  t:"Pre-IPO SPV platform"},
  {n:"G Squared",                 t:"Direct secondaries"},
  {n:"Industry Ventures",         t:"Secondaries / FoF"},
  {n:"StepStone",                 t:"Secondaries / co-invest"},
  {n:"iCapital",                  t:"Access-fund / feeder sponsor"},
];
function pickCompetitor(name){ state.comp.query=name; runCompetitor(); }

function runCompetitor(){
  const c=state.comp; const q=(c.query||"").trim();
  if(!q){ c.error="Enter a competitor name."; render(); return; }
  c.loading=true; c.error=null; render();
  fetch("/api/competitor-map?query="+encodeURIComponent(q))
    .then(r=> r.json().then(j=> r.ok ? j : Promise.reject(new Error(j.error||("HTTP "+r.status)))))
    .then(d=>{ c.loading=false; c.data=d; c.added={}; render(); })
    .catch(e=>{ c.loading=false; c.error=String(e&&e.message||e); render(); });
}
function addPersonComp(idx){
  const p=state.comp.data.people[idx]; if(!p) return;
  const since=new Date().toISOString().slice(0,7);
  INV.push({ id:nextInvId++, name:p.name, type:(p.roles&&p.roles[0])||"Contact", loc:"—",
    sig:p.channel?"familyoffice":"syndicate",
    sigTxt:`${p.channel?"Channel":"Competitor"} · ${p.vehicle}`, conn:"inbound",
    acc:"Unverified", stage:"new", check:0, vel:14, seg:"inst", sectors:["Foundation Models","AI Infra","AI Apps"],
    prior:0, since, touch:0 });
  state.comp.added[idx]=true; render();
}
function viewCompetitor(){
  const c=state.comp; const isFile=location.protocol==="file:";
  let body="";
  if(isFile){
    body=`<div class="note">Live search runs on the deployed site. Open your Vercel link to query the SEC — opening the raw file locally can't reach the API.</div>`;
  } else if(c.loading){
    body=`<div class="panel"><span class="spin"></span>Scanning SEC Form D filings live…</div>`;
  } else if(c.error){
    body=`<div class="elig no" style="margin-top:0"><span class="i">⦸</span><span>${c.error}</span></div>`;
  } else if(c.data){
    const d=c.data;
    if(!d.totalFilings){ body=`<div class="note">No Form D filings matched &ldquo;${d.query}&rdquo;. Their vehicles may file under differently-named entities — try the sponsor's fund names, or check their Form ADV first.</div>`; }
    else {
      const feeders=(d.feeders||[]).map(f=>`<div class="pcard"><div class="pgrow">
        <div class="pname">${f.name}</div>
        <div class="pmeta">${f.sponsor?("Channel: <b style='color:var(--accent)'>"+f.sponsor+"</b> · "):""}${f.exemption||""} ${f.date?("· "+f.date):""}</div>
        <div class="chips">${f.sold?`<span class="chip">${fmtM(f.sold)} raised</span>`:""}${f.investors?`<span class="chip">${f.investors} investors</span>`:""}${f.sold&&f.investors?`<span class="chip p">~${fmt$(Math.round(f.sold/f.investors))} avg — individual-scale checks</span>`:""}</div>
      </div></div>`).join("")||`<div class="note">No distinct feeder/channel vehicles detected in the matched filings.</div>`;
      const people=(d.people||[]).slice(0,40).map((p,i)=>{
        const added=!!c.added[i];
        return `<div class="netitem">
          <div class="grow"><div class="nn">${p.name} ${p.channel?'<span class="chip b" style="margin-left:6px">outreach target</span>':'<span class="chip" style="margin-left:6px">competitor officer</span>'}</div>
          <div class="nr">${(p.roles||[]).join(", ")||"—"} · ${p.vehicle}</div></div>
          <button class="addbtn ${added?"done":""}" ${added?"":`onclick="addPersonComp(${i})"`}>${added?"✓ Added":"Add to pipeline →"}</button>
        </div>`;}).join("")||`<div class="note">No named individuals in the enriched filings.</div>`;
      const agents=(d.placementAgents||[]).map(a=>`<span class="chip">${a.name}${a.crd?` · CRD ${a.crd}`:""}</span>`).join(" ")||`<span class="muted">none disclosed</span>`;
      body=`
      <div class="muted" style="margin:0 0 12px">${d.totalFilings} Form D filings · ${(d.counts&&d.counts.fund)||0} funds · ${(d.counts&&d.counts.feeder)||0} feeders · ${(d.counts&&d.counts.spv)||0} SPVs · as of ${(d.asOf||"").slice(0,10)}</div>
      <div class="panel"><h2>Distribution channels &amp; feeders</h2><p class="sub">Vehicles that pool an outside firm's clients into the competitor — the LP channels to court. Watch the investor counts and average check: feeders full of $100k–$1M tickets are proof that <b>HNW individuals already fund this exact strategy</b> — those are Cascade's people.</p>${feeders}</div>
      <div class="panel"><h2>Named people for outreach</h2><p class="sub">Real individuals from the filings. <b>Outreach targets</b> sit at the distribution channels; <b>competitor officers</b> are intel. Emails are appended by the enrichment layer.</p>${people}</div>
      <div class="panel" style="margin-bottom:0"><h2>Placement agents</h2><p class="sub">Brokers paid to sell the offerings — they hold LP relationships and can be a channel.</p>${agents}</div>`;
    }
  } else {
    body=`<div class="note">Enter a competitor (e.g. <b>137 Ventures</b>) and run a live scan of their public SEC Form D filings.</div>`;
  }
  return `
  <div class="eyebrow">06 — Competitive Intelligence</div>
  <h1 class="page">Competitor LP map</h1>
  <p class="lede">Type a rival and pull their public SEC Form D filings live — the fund vehicles, the <b>feeder / distribution channels</b> pooling capital into them, the <b>named people</b> (GPs, officers, signatories, placement agents), and raise sizes. LP names are confidential; this surfaces the <i>channels and people</i> to approach.</p>
  <div class="banner">Public SEC data — competitive intelligence, not an LP list. Outreach is relationship-building under 506(b), not solicitation. Full firm leadership + verified emails come from the enrichment layer.</div>
  <div class="ppl" style="margin-bottom:8px"><div class="h">Comparable firms — click to scan (curated; edit anytime)</div></div>
  <div class="presets" style="margin-bottom:14px">${COMPETITORS.map(x=>`<button class="preset ${c.query===x.n?"on":""}" onclick="pickCompetitor('${x.n.replace(/'/g,"\\'")}')" title="${x.t}">${x.n}</button>`).join("")}</div>
  <div class="finderbar">
    <input id="cq" placeholder="…or type any competitor — e.g. 137 Ventures" value="${c.query}" oninput="state.comp.query=this.value" />
    <button class="runbtn" ${c.loading?"disabled":""} onclick="runCompetitor()">${c.loading?"Scanning…":"Scan SEC filings"}</button>
  </div>
  ${body}`;
}

/* ---------- router ---------- */
function render(){
  const v={overview:viewOverview,pipeline:viewPipeline,warm:viewWarmNetwork,hnw:viewHNW,finder:viewFinder,competitor:viewCompetitor,matcher:viewMatcher,how:viewHow}[state.tab]();
  $("#main").innerHTML=v;
}
document.querySelectorAll("#tabs button").forEach(b=>b.onclick=()=>{
  state.tab=b.dataset.tab;
  document.querySelectorAll("#tabs button").forEach(x=>x.classList.toggle("active",x===b));
  render();
});
render();
</script>
</body></html>
